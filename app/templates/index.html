<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Location VOD - 鸿蒙问题辅助定位</title>
    <link rel="stylesheet" href="/static/css/app.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Location VOD</h1>
            <p class="subtitle">HarmonyOS 开发者问题辅助定位系统</p>
        </header>

        <div class="main-layout">
            <!-- 左侧：提交表单 -->
            <section class="submit-panel">
                <h2>提交问题</h2>
                <form id="task-form">
                    <div class="form-group">
                        <label for="problem_description">问题描述 *</label>
                        <textarea id="problem_description" name="problem_description"
                                  placeholder="描述你遇到的问题，例如：应用冻屏、崩溃、权限报错..."
                                  rows="4" required></textarea>
                    </div>
                    <div class="form-group">
                        <label for="log_content">故障日志</label>
                        <textarea id="log_content" name="log_content"
                                  placeholder="粘贴故障日志（hilog、HiviewDFX crash/freeze 等）..."
                                  rows="8"></textarea>
                    </div>
                    <div class="form-group">
                        <label for="code_snippet">代码片段</label>
                        <textarea id="code_snippet" name="code_snippet"
                                  placeholder="粘贴相关代码片段（可选）..."
                                  rows="4"></textarea>
                    </div>
                    <button type="submit" class="btn-primary">提交分析</button>
                </form>
            </section>

            <!-- 右侧：任务列表 -->
            <section class="task-list-panel">
                <h2>任务列表</h2>
                <div id="task-list">
                    <p class="empty-hint">暂无任务</p>
                </div>
            </section>
        </div>
    </div>

    <script src="/static/js/index.js"></script>
</body>
</html>
